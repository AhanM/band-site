<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daisy's Room</title>
    <link rel="icon" href="assets/favicon-32.png" type="image/png" sizes="32x32">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    <meta name="description" content="Daisy's Room — official site">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:ital,wght@1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=22">
</head>
<body>
    <div class="page-bg" aria-hidden="true">
        <picture>
            <source type="image/webp" srcset="assets/grain-source.webp">
            <img
                class="page-bg__img"
                src="assets/grain-source.jpg"
                alt=""
                width="2048"
                height="3071"
                decoding="async"
                fetchpriority="high"
            >
        </picture>
    </div>
    <div class="decor" aria-hidden="true">
        <span class="decor-star decor-star--1"></span>
        <span class="decor-star decor-star--2"></span>
        <span class="decor-star decor-star--3"></span>
        <span class="decor-star decor-star--4"></span>
        <span class="decor-star decor-star--5"></span>
        <span class="decor-scratch decor-scratch--1"></span>
        <span class="decor-scratch decor-scratch--2"></span>
    </div>

            <p class="site-top__line">brooklyn ny</p>
            <a class="site-top__line site-top__email" href="mailto:booking@daisysroom.band">booking@daisysroom.band</a>

    <main class="landing">
        <header class="page-brand landing__brand">
            <a class="page-brand__link" href="/" aria-label="Daisy's Room home">
                <img
                    class="page-brand__logo"
                    src="assets/band_logo.png?v=2"
                    alt="Daisy's Room"
                    width="442"
                    height="160"
                >
            </a>
        </header>

        <figure class="landing__hero">
            <!-- Swap to video: use assets/autoplay_video.mov with poster band_imagev2.jpeg -->
            <img
                class="landing__hero-img"
                src="assets/band_imagev2.jpeg"
                alt="Daisy's Room"
                width="4240"
                height="2832"
            >
        </figure>

        <nav class="landing__nav" aria-label="Primary">
            <div class="listen-wrap">
                <button
                    type="button"
                    class="nav-item listen-trigger"
                    aria-expanded="false"
                    aria-haspopup="true"
                    aria-controls="listen-menu"
                >
                    LISTEN
                    <span class="caret" aria-hidden="true"></span>
                </button>
                <ul class="listen-menu" id="listen-menu" role="menu">
                    <li role="none">
                        <a role="menuitem" class="listen-menu__link" href="https://open.spotify.com/artist/15dZrNgZo1EuZrM7pJednS?si=pNxs9BGlQN2vCq5tK89vWA" target="_blank" rel="noopener noreferrer">Spotify</a>
                    </li>
                    <li role="none">
                        <a role="menuitem" class="listen-menu__link" href="https://music.apple.com/us/artist/daisys-room/1743080226" target="_blank" rel="noopener noreferrer">Apple Music</a>
                    </li>
                    <li role="none">
                        <a role="menuitem" class="listen-menu__link" href="https://tidal.com/artist/47363124" target="_blank" rel="noopener noreferrer">Tidal</a>
                    </li>
                </ul>
            </div>
            <a class="nav-item nav-item--shows" href="/shows">SHOWS</a>
            <a class="nav-item nav-item--signup" href="/signup">SIGN UP</a>
        </nav>
    </main>

    <script src="script.js?v=3"></script>

</html>
